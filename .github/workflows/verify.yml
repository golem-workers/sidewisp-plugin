name: verify
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
      - run: npm install --global openclaw@2026.7.1-2
      - run: ./scripts/verify-release.sh
  signed-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
      - name: Verify immutable version tag
        run: |
          test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
          test "$(git cat-file -t "${GITHUB_REF_NAME}")" = tag
          test "$(git rev-parse "${GITHUB_REF_NAME}^{}")" = "${GITHUB_SHA}"
      - name: Build release tarball
        run: mkdir -p dist && npm pack --pack-destination dist
      - name: Record digest
        run: sha256sum dist/*.tgz > dist/SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tgz
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tgz dist/SHA256SUMS \
            --verify-tag \
            --title "Sidewisp Plugin ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md
