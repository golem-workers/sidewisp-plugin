name: verify
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
      - run: npm install --global openclaw@2026.7.1-2
      - run: ./scripts/verify-release.sh
  signed-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
      - name: Verify signed version tag
        run: git verify-tag "${GITHUB_REF_NAME}"
      - name: Build release tarball
        run: mkdir -p dist && npm pack --pack-destination dist
      - name: Record digest
        run: sha256sum dist/*.tgz > dist/SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: sidewisp-plugin-${{ github.ref_name }}
          path: dist/
