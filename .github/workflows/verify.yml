name: verify
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
      - run: npm install --global openclaw@2026.7.1-2
      - run: ./scripts/verify-release.sh
